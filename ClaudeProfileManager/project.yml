name: ClaudeProfileManager
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  ClaudeProfileManager:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.profile-manager
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
  ClaudeProfileManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: ClaudeProfileManager
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClaudeProfileManager.app/Contents/MacOS/ClaudeProfileManager"
        BUNDLE_LOADER: "$(TEST_HOST)"
